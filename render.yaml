services:
  - type: web
    name: queueflow-api
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn queueflow.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: queueflow-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://queueflow-psi.vercel.app"

databases:
  - name: queueflow-db
    databaseName: queueflow
    user: queueflow_user
